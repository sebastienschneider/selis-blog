baseURL = "https://selis.netlify.app/"
theme = 'hugo-bearblog'

title = "Seli's Blog"
author = "Seli"
copyright = "Copyright © 2025, Seli."
languageCode = "en-US"

enableRobotsTXT = true

disableKinds = ["taxonomy"]
ignoreErrors = ["error-disable-taxonomy"]
[permalinks]
  blog = "/:slug/"
  tags = "/blog/:slug"

[params]
  description = "Thoughts on technology, development, and the web."
  favicon = "images/favicon.png"
  images = ["images/share.png"]
  title = "Seli's Blog"
  enablePostNavigator = true
  dateFormat = "Jan 2, 2006"

[markup]
  [markup.highlight]
    style = 'dracula'
    lineNos = true
    lineNumbersInTable = false
    codeFences = true
